<!doctype html>
<html>
  <head>
    <title>System Error</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        height: 100%;
        margin: 0;
      }
      .error-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .error-message {
        color: #d32f2f;
        margin: 20px 0;
        word-break: break-word;
      }
      .error-code {
        font-family: monospace;
        background: #f0f0f0;
        padding: 2px 6px;
        border-radius: 3px;
        margin-left: 5px;
      }
      .buttons-container {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
        flex-wrap: wrap;
      }
      button {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        min-width: 120px;
      }
      .primary-action {
        background: #4285f4;
        color: white;
      }
      .secondary-action {
        background: #f1f1f1;
        color: #333;
      }
      .help-action {
        background: #f8f8f8;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <h1>System Error</h1>
      <div id="errorMessage" class="error-message"></div>
      <div class="buttons-container" id="buttonsContainer">
        <!-- Buttons will be dynamically inserted here -->
      </div>
    </div>

    <script>
      const { onWebSocketError, sendMain } = window.electronAPI;

      onWebSocketError(details => {
        displayError(details);
        setupButtons(details);
      });

      function displayError(details) {
        const errorElement = document.getElementById('errorMessage');
        errorElement.innerHTML = `
                ${details.message}
                <span class="error-code">${details.code}</span>
            `;
      }

      function addButton(label, className, onClick) {
        const button = document.createElement('button');
        button.className = className;
        button.textContent = label;
        button.addEventListener('click', onClick);
        document.getElementById('buttonsContainer').appendChild(button);
      }

      function setupButtons(details) {
        const container = document.getElementById('buttonsContainer');
        container.innerHTML = ''; // Clear existing buttons

        // Add buttons based on error code
        switch (details.code) {
          case 1:
          case 2:
          case 3: {
            addButton('Restart App', 'primary-action', () => sendMain('RESTART_ELECTRON_APP'));
            break;
          }

          default: {
            addButton('Restart App', 'primary-action', () => sendMain('RESTART_ELECTRON_APP'));
            break;
          }
        }
      }
    </script>
  </body>
</html>
