<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="static/css/bootstrap.min.css">
  <style>
    html, body {
      font-family: monaco, Consolas, Lucida Console, monospace;
      font-size: 23px;
      letter-spacing: -1px;
      width: 512px;
    }

    .container-fluid {
      margin-top: 50px;
      margin-bottom: 30px;
    }

    .text-small {
      font-size: 20px;
    }

    .col, .col-12 {
      padding-left: 0;
      padding-right: 0;
    }

    .header-row {
      margin-bottom: 20px;
    }

    .voucher-bold {
      font-weight: 900;
      font-size: 28px;
    }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row header-row">
    <div class="col text-center">
      <img class="image-fluid" style="width: 512px;height: 70px;" src="{{twoDBarcodeImage}}"/>
    </div>
  </div>
  <div class="row header-row">
  <div class="col text-center">
    <img src="{{logoUrl}}" style="width:190px;height:75px;"/>
  </div>
  </div>
  <div class="row">
    <div class="col text-center voucher-bold ">
      <span>ΑΠΟΔΕΙΚΤΙΚΟ VOUCHER</span>
    </div>
  </div>
  <div class="row">
    <div class="col text-center mb-4 d-flex justify-content-center align-items-center" style="height: 5em">
         <span>{{voucherMessage}}</span>
    </div>
  </div>
  <div class="row total-cost">
    <div class="col text-center voucher-bold ">
      <span>{{voucher.amount}}&ensp;EUR</span>
    </div>
  </div>
  <div class="row">
    <div class="col text-center">
      <span>{{currentDate}}</span>
    </div>
  </div>
  <div class="row">
    <div class="col text-center">
      <span>{{voucher.retailerId}}-{{voucher.terminalId}}-{{voucher.operatorId}}</span>
    </div>
  </div>
  <div class="row mb-1 mt-2">
    <div class="col-12 text-center text-small">{{companyInfo.name}}</div>
    <div class="col-12 text-center text-small">{{companyInfo.address}} {{companyInfo.gemiNumber}}</div>
  </div>
  <div class="row">
    <div class="col text-center">
      <span>{{voucher.voucherId}}</span>
    </div>
  </div>
  <div class="row">
    <div class="col text-center mb-4">
      <img class="image-fluid" style="width: 512px;height: 100px;" src="{{oneDBarcodeImage}}"/>
    </div>
  </div>
</div>
</body>
</html>
